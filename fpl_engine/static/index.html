<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live FPL Strategy Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #09131f;
        --bg-soft: #0f1f33;
        --panel: rgba(12, 33, 55, 0.85);
        --text: #e9f3ff;
        --muted: #9bb4cf;
        --accent: #47d6a2;
        --accent-warm: #ffb454;
        --danger: #ff6f61;
        --border: rgba(160, 195, 230, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, rgba(71, 214, 162, 0.15), transparent 35%),
          radial-gradient(circle at 85% 15%, rgba(255, 180, 84, 0.18), transparent 38%),
          linear-gradient(135deg, var(--bg), #0a1a2d 40%, var(--bg-soft));
      }

      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .hero {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .title {
        font-size: clamp(1.5rem, 3vw, 2.4rem);
        margin: 0;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .badge {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(13, 40, 63, 0.7);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }

      .card {
        grid-column: span 12;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        padding: 14px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .summary .stat {
        padding: 10px;
        border-radius: 12px;
        background: rgba(8, 29, 48, 0.7);
      }

      .label {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .value {
        font-size: 1.25rem;
        margin-top: 6px;
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th,
      td {
        text-align: left;
        padding: 9px 8px;
        border-bottom: 1px solid rgba(160, 195, 230, 0.12);
      }

      th {
        color: var(--muted);
        font-weight: 500;
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .good {
        color: var(--accent);
      }

      .warn {
        color: var(--accent-warm);
      }

      .bad {
        color: var(--danger);
      }

      @media (max-width: 820px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .hero {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1 class="title">Live FPL Strategy Engine</h1>
          <p class="subtitle">Real-time projection + top 10k probability monitor</p>
        </div>
        <div id="status" class="badge">Connecting...</div>
      </section>

      <section class="grid">
        <article class="card">
          <div class="summary">
            <div class="stat">
              <div class="label">Last Iteration</div>
              <div id="iteration" class="value mono">-</div>
            </div>
            <div class="stat">
              <div class="label">Snapshot Time (UTC)</div>
              <div id="asOf" class="value mono" style="font-size: 1rem">-</div>
            </div>
            <div class="stat">
              <div class="label">Tracked Teams</div>
              <div id="teamsCount" class="value mono">0</div>
            </div>
          </div>
        </article>

        <article class="card">
          <h3 style="margin: 0 0 8px">Top 10k Probability</h3>
          <table>
            <thead>
              <tr>
                <th>Team</th>
                <th>Probability</th>
                <th>Expected Rank</th>
              </tr>
            </thead>
            <tbody id="rankRows"></tbody>
          </table>
        </article>

        <article class="card">
          <h3 style="margin: 0 0 8px">Player Projections</h3>
          <table>
            <thead>
              <tr>
                <th>Player ID</th>
                <th>Current</th>
                <th>Expected +</th>
                <th>Projected Total</th>
              </tr>
            </thead>
            <tbody id="projectionRows"></tbody>
          </table>
        </article>
      </section>
    </main>

    <script>
      const statusNode = document.getElementById("status");
      const iterationNode = document.getElementById("iteration");
      const asOfNode = document.getElementById("asOf");
      const teamsCountNode = document.getElementById("teamsCount");
      const rankRowsNode = document.getElementById("rankRows");
      const projectionRowsNode = document.getElementById("projectionRows");

      let reconnectTimer = null;

      function probabilityClass(probability) {
        if (probability >= 0.6) return "good";
        if (probability >= 0.35) return "warn";
        return "bad";
      }

      function renderSnapshot(snap) {
        iterationNode.textContent = String(snap.iteration ?? "-");
        asOfNode.textContent = snap.as_of ? new Date(snap.as_of).toISOString() : "-";

        const ranking = snap.ranking_by_team ?? {};
        const rows = Object.entries(ranking);
        teamsCountNode.textContent = String(rows.length);

        rankRowsNode.innerHTML = rows
          .map(([team, estimate]) => {
            const pct = ((estimate.probability_top10k ?? 0) * 100).toFixed(2);
            const cls = probabilityClass(estimate.probability_top10k ?? 0);
            return `
              <tr>
                <td>${team}</td>
                <td class="mono ${cls}">${pct}%</td>
                <td class="mono">${estimate.expected_global_rank ?? "-"}</td>
              </tr>
            `;
          })
          .join("");

        const projections = Object.values(snap.projections ?? {})
          .sort((a, b) => (b.projected_total_points ?? 0) - (a.projected_total_points ?? 0))
          .slice(0, 12);

        projectionRowsNode.innerHTML = projections
          .map((p) => {
            return `
              <tr>
                <td class="mono">${p.player_id}</td>
                <td class="mono">${(p.current_points ?? 0).toFixed(2)}</td>
                <td class="mono">${(p.expected_additional_points ?? 0).toFixed(2)}</td>
                <td class="mono">${(p.projected_total_points ?? 0).toFixed(2)}</td>
              </tr>
            `;
          })
          .join("");
      }

      function setStatus(text, connected) {
        statusNode.textContent = text;
        statusNode.style.borderColor = connected ? "rgba(71, 214, 162, 0.45)" : "rgba(255, 111, 97, 0.5)";
      }

      function connect() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);

        ws.onopen = () => {
          setStatus("Live stream connected", true);
        };

        ws.onmessage = (event) => {
          const snap = JSON.parse(event.data);
          renderSnapshot(snap);
        };

        ws.onclose = () => {
          setStatus("Disconnected, reconnecting...", false);
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 1000);
        };

        ws.onerror = () => {
          ws.close();
        };
      }

      connect();
    </script>
  </body>
</html>
